<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="260" viewBox="0 0 1100 260">
  <defs>
    <linearGradient id="gradFill" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff00cc"/>
      <stop offset="55%" stop-color="#8a2be2"/>
      <stop offset="100%" stop-color="#33ff99"/>
    </linearGradient>

    <linearGradient id="gradStroke" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffd1ff"/>
      <stop offset="50%" stop-color="#d6c7ff"/>
      <stop offset="100%" stop-color="#d1ffe9"/>
    </linearGradient>

    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#000" flood-opacity="0.65"/>
    </filter>

    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="100%" height="100%" fill="transparent"/>

  <!-- splatters -->
  <g opacity="0.9">
    <circle cx="120" cy="80" r="6" fill="#ff00cc"/>
    <circle cx="155" cy="58" r="3" fill="#ff00cc"/>
    <circle cx="210" cy="95" r="4" fill="#8a2be2"/>
    <circle cx="930" cy="70" r="6" fill="#33ff99"/>
    <circle cx="970" cy="95" r="3" fill="#33ff99"/>
    <circle cx="900" cy="105" r="4" fill="#8a2be2"/>
  </g>

  <!-- underline swash -->
  <path d="M180 190 C 360 250, 720 250, 920 185"
        fill="none" stroke="url(#gradFill)" stroke-width="14" stroke-linecap="round" opacity="0.9" filter="url(#softShadow)"/>
  <path d="M190 190 C 360 238, 720 238, 910 186"
        fill="none" stroke="#000" stroke-width="4" stroke-linecap="round" opacity="0.75"/>

  <!-- main text group (skewed) -->
  <g transform="translate(0,0) skewX(-10)" filter="url(#softShadow)">
    <!-- fat outer stroke -->
    <text x="560" y="150" text-anchor="middle"
          font-family="cursive"
          font-size="108"
          fill="none"
          stroke="#000000"
          stroke-width="10"
          stroke-linejoin="round">
      «Блэк Танцы»
    </text>

    <!-- colored fill -->
    <text x="560" y="150" text-anchor="middle"
          font-family="cursive"
          font-size="108"
          fill="url(#gradFill)"
          stroke="url(#gradStroke)"
          stroke-width="2.2"
          stroke-linejoin="round"
          filter="url(#glow)">
      «Блэк Танцы»
    </text>

    <!-- inner highlight stroke -->
    <text x="560" y="150" text-anchor="middle"
          font-family="cursive"
          font-size="108"
          fill="none"
          stroke="rgba(255,255,255,0.55)"
          stroke-width="1.2"
          stroke-linejoin="round"
          opacity="0.9">
      «Блэк Танцы»
    </text>
  </g>

  <!-- drips -->
  <g opacity="0.85" filter="url(#softShadow)">
    <path d="M420 170 C420 200, 410 210, 410 235" stroke="url(#gradFill)" stroke-width="8" stroke-linecap="round" fill="none"/>
    <path d="M700 172 C700 205, 710 212, 710 240" stroke="url(#gradFill)" stroke-width="7" stroke-linecap="round" fill="none"/>
    <path d="M820 168 C820 195, 828 206, 828 228" stroke="url(#gradFill)" stroke-width="6" stroke-linecap="round" fill="none"/>
    <circle cx="410" cy="240" r="6" fill="url(#gradFill)"/>
    <circle cx="710" cy="246" r="6" fill="url(#gradFill)"/>
    <circle cx="828" cy="233" r="5" fill="url(#gradFill)"/>
  </g>
</svg>
