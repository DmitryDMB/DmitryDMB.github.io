<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="300" viewBox="0 0 1200 300">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff00cc;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#9933ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#33ff99;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#000000" flood-opacity="0.7"/>
    </filter>
  </defs>
  <rect width="100%" height="100%" fill="transparent"/>
  <text x="50%" y="60%" text-anchor="middle"
        font-family="Impact, Arial Black, sans-serif"
        font-size="150"
        fill="url(#grad1)"
        stroke="#000000"
        stroke-width="4"
        filter="url(#shadow)">
    Блэк Танцы
  </text>
</svg>
